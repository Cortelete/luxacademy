<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Studio - Cursos de Lash Designer</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      /* Elegant Light Theme (Default) */
      :root {
        --color-background: #F9F7F5; /* Soft Porcelain/Off-White */
        --color-surface: #FFFFFF;     /* Pure White */
        --color-primary: #B08D55;     /* Antique Gold/Bronze */
        --color-primary-light: #D4B886;
        --color-primary-contrast: #FFFFFF;
        --color-text: #4A4A4A;        /* Dark Gray for body */
        --color-text-strong: #2D2D2D; /* Charcoal for headings */
        --color-text-subtle: #888888;
        --color-border: #E5E5E5;
        --color-success: #5F8D4E;
        --color-danger: #C75B5B;
        --color-modal-overlay: rgba(255, 255, 255, 0.85); /* Light blurred overlay */
        --color-tag-bg: #F0EBE5;
      }

      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: var(--color-background);
        color: var(--color-text);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        line-height: 1.6;
      }

      /* Typography */
      .font-playfair {
        font-family: 'Playfair Display', serif;
      }
      .font-montserrat {
        font-family: 'Montserrat', sans-serif;
      }

      /* Clean Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-background);
      }
      ::-webkit-scrollbar-thumb {
        background: #D1D1D1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-primary);
      }

      /* Utilities */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--color-primary-light);
        border-radius: 4px;
      }

      /* Subtle Winking Animation */
      @keyframes subtle-wink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      .subtle-wink-animation {
        animation: subtle-wink 6s ease-in-out infinite;
      }

      /* Fade In */
      .fade-in-section {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
      }
      .fade-in-section.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Floating Animation */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 5s ease-in-out infinite;
      }

      /* Hero Text Gradient */
      .hero-title-golden {
          color: var(--color-text-strong);
      }
      
    </style>

</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
